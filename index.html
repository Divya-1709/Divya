<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="React portfolio of Divya N, a Computer Science and Engineering student at National Engineering College.">
  <meta name="keywords" content="Divya N, student portfolio, React portfolio, National Engineering College, Computer Science">
  <meta name="author" content="Divya N">
  <meta property="og:title" content="Divya N | React Portfolio">
  <meta property="og:description" content="Modern React portfolio for Divya N featuring projects, academics, certificates, and contact details.">
  <meta property="og:type" content="website">
  <title>Divya N | React Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #f4efe6;
      --bg-soft: #fbf7f1;
      --panel: rgba(255, 255, 255, 0.75);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --ink: #1f2333;
      --muted: #61697d;
      --line: rgba(31, 35, 51, 0.1);
      --brand: #be5b32;
      --brand-deep: #8e3f1f;
      --accent: #17314f;
      --accent-soft: #dfeafb;
      --success: #1d6b57;
      --shadow-lg: 0 30px 80px rgba(23, 49, 79, 0.16);
      --shadow-md: 0 18px 45px rgba(31, 35, 51, 0.1);
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --container: min(1180px, calc(100% - 32px));
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(190, 91, 50, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(23, 49, 79, 0.14), transparent 24%),
        linear-gradient(180deg, #efe7d8 0%, #f8f2e8 20%, #f4efe6 52%, #fbf7f1 100%);
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img,
    iframe {
      display: block;
      max-width: 100%;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: none;
    }

    .shell {
      position: relative;
      min-height: 100vh;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      filter: blur(28px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .shell::before {
      top: -120px;
      left: -120px;
      background: rgba(190, 91, 50, 0.15);
    }

    .shell::after {
      right: -120px;
      bottom: 5%;
      background: rgba(23, 49, 79, 0.15);
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(20px);
      background: rgba(251, 247, 241, 0.72);
      border-bottom: 1px solid rgba(31, 35, 51, 0.08);
    }

    .nav-wrap {
      width: var(--container);
      margin: 0 auto;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      box-shadow: 0 14px 30px rgba(190, 91, 50, 0.28);
    }

    .brand-copy strong,
    .hero-copy h1,
    .section-head h2,
    .card-title,
    .project-card h3,
    .certificate-card h3,
    .timeline-card h3 {
      font-family: "Space Grotesk", sans-serif;
    }

    .brand-copy strong {
      display: block;
      font-size: 1rem;
      line-height: 1.1;
    }

    .brand-copy span {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link,
    .menu-button {
      padding: 11px 16px;
      border-radius: 999px;
      transition: 0.25s ease;
      color: var(--muted);
      font-weight: 600;
    }

    .nav-link:hover,
    .nav-link.active,
    .menu-button:hover {
      color: var(--ink);
      background: rgba(23, 49, 79, 0.08);
    }

    .menu-button {
      display: none;
      border: 1px solid var(--line);
      color: var(--ink);
    }

    main,
    footer {
      position: relative;
      z-index: 1;
    }

    .hero {
      width: var(--container);
      margin: 32px auto 0;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 28px;
      align-items: stretch;
    }

    .hero-copy,
    .hero-aside {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.62));
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: var(--shadow-lg);
    }

    .hero-copy {
      padding: 42px;
    }

    .hero-copy::before {
      content: "";
      position: absolute;
      inset: auto -50px -50px auto;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(190, 91, 50, 0.16), transparent 68%);
    }

    .eyebrow,
    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(23, 49, 79, 0.08);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.84rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hero-copy h1 {
      font-size: clamp(2.8rem, 6vw, 5.3rem);
      line-height: 0.96;
      margin: 18px 0 16px;
      letter-spacing: -0.05em;
    }

    .hero-copy h1 span {
      color: var(--brand);
    }

    .hero-title {
      margin-top: 24px;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 44rem;
    }

    .hero-lead {
      font-size: 1.08rem;
      line-height: 1.8;
      max-width: 44rem;
      margin-bottom: 18px;
    }

    .type-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0 26px;
      padding: 13px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(31, 35, 51, 0.06);
      box-shadow: 0 12px 30px rgba(31, 35, 51, 0.07);
      font-weight: 700;
      color: var(--accent);
    }

    .protocol-note {
      margin: 18px 0 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(23, 49, 79, 0.08);
      color: var(--accent);
      font-weight: 700;
      line-height: 1.6;
    }

    .type-pill strong {
      color: var(--brand);
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 30px 0;
    }

    .stat-card,
    .floating-card,
    .info-card,
    .skill-card,
    .project-card,
    .certificate-card,
    .activity-card,
    .contact-card,
    .timeline-card,
    .highlight-card {
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: var(--shadow-md);
    }

    .stat-card {
      padding: 18px;
      border-radius: 22px;
    }

    .stat-card small {
      color: var(--muted);
      display: block;
      margin-bottom: 10px;
    }

    .stat-card strong {
      display: block;
      font-size: 1.2rem;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 16px;
      font-weight: 800;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      box-shadow: 0 16px 30px rgba(190, 91, 50, 0.26);
    }

    .btn-secondary {
      color: var(--accent);
      background: rgba(23, 49, 79, 0.08);
      border: 1px solid rgba(23, 49, 79, 0.08);
    }

    .hero-aside {
      padding: 28px;
      display: grid;
      gap: 18px;
      align-content: start;
      background:
        linear-gradient(180deg, rgba(23, 49, 79, 0.94), rgba(13, 31, 51, 0.94)),
        linear-gradient(135deg, rgba(255, 255, 255, 0.06), transparent);
      color: white;
    }

    .portrait-frame {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.04));
      min-height: 420px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 18px;
    }

    .portrait-frame::before {
      content: "";
      position: absolute;
      inset: 24px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .portrait-frame img {
      position: relative;
      z-index: 1;
      width: min(100%, 340px);
      border-radius: 24px;
      object-fit: cover;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    .aside-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .floating-card {
      min-height: 120px;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.08);
      color: white;
      box-shadow: none;
    }

    .floating-card small {
      display: block;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 10px;
    }

    .floating-card strong {
      display: block;
      font-size: 1.05rem;
      line-height: 1.4;
    }

    .section {
      width: var(--container);
      margin: 26px auto 0;
      padding: 38px;
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.62));
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow-lg);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 26px;
    }

    .section-head h2 {
      margin: 16px 0 0;
      font-size: clamp(1.9rem, 3vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .section-head p {
      max-width: 34rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.8;
    }

    .about-grid,
    .contact-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 22px;
    }

    .info-card,
    .contact-card {
      padding: 28px;
      border-radius: 26px;
    }

    .about-copy p,
    .contact-card p {
      color: var(--muted);
      line-height: 1.8;
    }

    .highlight-grid,
    .skills-grid,
    .projects-grid,
    .certificates-grid,
    .activities-grid {
      display: grid;
      gap: 18px;
    }

    .highlight-grid {
      grid-template-columns: 1fr;
      margin-top: 0;
    }

    .highlight-card {
      padding: 22px;
      border-radius: 22px;
    }

    .highlight-card strong {
      display: block;
      margin-bottom: 10px;
      font-size: 1.15rem;
      line-height: 1.3;
    }

    .highlight-card p {
      color: var(--muted);
      margin: 0;
      line-height: 1.7;
    }

    .about-side {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .about-side-head {
      padding-bottom: 4px;
    }

    .about-side-head strong {
      display: block;
      margin-bottom: 8px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.35rem;
      line-height: 1.2;
      color: var(--ink);
    }

    .about-side-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.75;
    }

    .chip-row,
    .filter-row,
    .contact-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip,
    .filter-button,
    .summary-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      font-weight: 700;
    }

    .chip,
    .summary-pill {
      background: rgba(23, 49, 79, 0.08);
      color: var(--accent);
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin: 22px 0;
    }

    .stats-strip .stat-card {
      background: rgba(23, 49, 79, 0.05);
      box-shadow: none;
      border-color: rgba(23, 49, 79, 0.04);
    }

    .timeline {
      display: grid;
      gap: 18px;
    }

    .timeline-card {
      padding: 24px;
      border-radius: 24px;
      position: relative;
      overflow: hidden;
    }

    .timeline-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: linear-gradient(180deg, var(--brand), var(--accent));
    }

    .timeline-badge,
    .meta-line {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 0.86rem;
      background: rgba(190, 91, 50, 0.12);
      color: var(--brand-deep);
    }

    .timeline-card h3,
    .project-card h3,
    .certificate-card h3,
    .activity-card h3 {
      margin: 16px 0 10px;
      font-size: 1.28rem;
      line-height: 1.2;
    }

    .timeline-card p,
    .project-card p,
    .certificate-card p,
    .activity-card p {
      color: var(--muted);
      line-height: 1.75;
      margin: 0 0 10px;
    }

    .timeline-score {
      margin-top: 16px;
      font-weight: 800;
      color: var(--accent);
    }

    .skills-grid {
      grid-template-columns: 1.1fr 0.9fr 0.9fr;
    }

    .skill-card,
    .project-card,
    .certificate-card,
    .activity-card {
      padding: 24px;
      border-radius: 24px;
    }

    .card-title {
      margin: 0 0 18px;
      font-size: 1.2rem;
    }

    .progress-stack {
      display: grid;
      gap: 14px;
    }

    .progress-row label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .progress {
      height: 12px;
      border-radius: 999px;
      background: rgba(23, 49, 79, 0.08);
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--brand), var(--accent));
    }

    .projects-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .project-card {
      position: relative;
      overflow: hidden;
    }

    .project-card::after {
      content: "";
      position: absolute;
      inset: auto -35px -35px auto;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(190, 91, 50, 0.14), transparent 70%);
    }

    .project-footer,
    .certificate-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .text-link,
    .ghost-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      padding: 0 15px;
      border-radius: 14px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(23, 49, 79, 0.08);
    }

    .note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .certificate-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-button {
      color: var(--muted);
      background: rgba(23, 49, 79, 0.05);
      border: 1px solid transparent;
    }

    .filter-button.active {
      color: white;
      background: linear-gradient(135deg, var(--accent), #20456f);
      box-shadow: 0 12px 24px rgba(23, 49, 79, 0.2);
    }

    .certificates-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .certificate-card {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .certificate-preview {
      position: relative;
      min-height: 220px;
      border-radius: 20px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(23, 49, 79, 0.08), rgba(190, 91, 50, 0.12)),
        white;
      border: 1px solid rgba(23, 49, 79, 0.08);
      display: grid;
      place-items: center;
    }

    .certificate-preview img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .certificate-preview canvas {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .badge {
      position: absolute;
      top: 14px;
      left: 14px;
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.92);
      color: var(--accent);
      z-index: 1;
    }

    .pdf-placeholder {
      width: calc(100% - 26px);
      min-height: 190px;
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed rgba(23, 49, 79, 0.24);
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--accent);
      background: rgba(255, 255, 255, 0.62);
    }

    .pdf-placeholder strong {
      display: block;
      margin-bottom: 6px;
      font-size: 2rem;
    }

    .pdf-placeholder.loading {
      color: var(--muted);
    }

    .activities-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .activity-card span {
      display: inline-block;
      margin-top: 8px;
      color: var(--brand-deep);
      font-weight: 800;
    }

    .contact-list a {
      min-height: 44px;
      padding: 0 14px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      background: rgba(23, 49, 79, 0.08);
      color: var(--accent);
      font-weight: 700;
    }

    .contact-form {
      display: grid;
      gap: 14px;
      margin-top: 12px;
    }

    .field {
      min-height: 54px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1px solid rgba(23, 49, 79, 0.12);
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      outline: none;
    }

    textarea.field {
      min-height: 140px;
      padding: 16px;
      resize: vertical;
    }

    .footer {
      width: var(--container);
      margin: 26px auto 34px;
      padding: 26px 30px;
      border-radius: 28px;
      background: #12263d;
      color: rgba(255, 255, 255, 0.86);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      box-shadow: var(--shadow-lg);
    }

    .footer strong {
      display: block;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.1rem;
      color: white;
      margin-bottom: 6px;
    }

    .footer p {
      margin: 0;
      color: rgba(255, 255, 255, 0.7);
    }

    .back-top {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 40;
      width: 52px;
      height: 52px;
      border-radius: 18px;
      color: white;
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      box-shadow: 0 18px 30px rgba(190, 91, 50, 0.28);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(11, 18, 29, 0.8);
      backdrop-filter: blur(10px);
    }

    .modal-card {
      width: min(960px, 100%);
      max-height: calc(100vh - 48px);
      background: white;
      border-radius: 28px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .modal-head {
      display: flex;
      align-items: center;

    function PdfThumbnail({ file, title }) {
      const canvasRef = useRef(null);
      const [status, setStatus] = useState("loading");

      useEffect(() => {
        let cancelled = false;
        let pdfDocument = null;
        const canvas = canvasRef.current;

        async function renderPdfThumb() {
          if (!window.pdfjsLib || !canvas) {
            setStatus("error");
            return;
          }

          try {
            setStatus("loading");
            const loadingTask = window.pdfjsLib.getDocument({
              url: file,
              disableWorker: true
            });
            pdfDocument = await loadingTask.promise;
            const page = await pdfDocument.getPage(1);
            const viewport = page.getViewport({ scale: 1 });
            const targetWidth = 720;
            const scale = targetWidth / viewport.width;
            const scaledViewport = page.getViewport({ scale });
            const context = canvas.getContext("2d");

            canvas.width = scaledViewport.width;
            canvas.height = scaledViewport.height;

            await page.render({
              canvasContext: context,
              viewport: scaledViewport
            }).promise;

            if (!cancelled) {
              setStatus("ready");
            }
          } catch (error) {
            console.error("PDF thumbnail render failed:", file, error);
            if (!cancelled) {
              setStatus("error");
            }
          }
        }

        renderPdfThumb();

        return () => {
          cancelled = true;
          if (pdfDocument) {
            pdfDocument.destroy();
          }
        };
      }, [file]);

      if (status === "error") {
        return (
          <div className="pdf-placeholder">
            <div>
              <strong>PDF</strong>
              <div>Preview unavailable for this file.</div>
            </div>
          </div>
        );
      }

      return (
        <>
          <canvas
            ref={canvasRef}
            aria-label={`${title} preview`}
            style={{ display: status === "ready" ? "block" : "none" }}
          />
          {status !== "ready" && (
            <div className="pdf-placeholder loading">
              <div>
                <strong>PDF</strong>
                <div>Loading first page preview...</div>
              </div>
            </div>
          )}
        </>
      );
    }

                </div>
                <div className="aside-grid">
                  <div className="floating-card">
                    <small>Department</small>
                    <strong>Computer Science and Engineering</strong>
                  </div>
                  <div className="floating-card">
                    <small>Learning Track</small>
                    <strong>Web, cloud, and IoT exploration</strong>
                  </div>
                  <div className="floating-card">
                    <small>Portfolio Strength</small>
                    <strong>Certificates, projects, and competition exposure</strong>
                  </div>
                  <div className="floating-card">
                    <small>Availability</small>
                    <strong>Open to internships and collaboration</strong>
                  </div>
                </div>
              </aside>
            </section>

            <section className="section" id="about">
              <SectionHeader
                kicker="About Me"
                title="A builder mindset shaped by academics, design curiosity, and practical learning"
                text="This React portfolio keeps the original portfolio content but presents it through a cleaner, more responsive interface."
              />

              <div className="about-grid">
                <div className="info-card about-copy">
                  <p>
                    I am a B.E. Computer Science and Engineering student at National Engineering College with a growing
                    portfolio in web development, backend systems, interface design, and technical event participation.
                  </p>
                  <p>
                    My current direction strongly aligns with full stack development, UI and UX exploration, problem
                    solving, cloud computing, and hands-on learning through projects, certifications, and hackathons.
                  </p>

                  <div className="stats-strip">
                    <div className="stat-card">
                      <small>Current CGPA</small>
                      <strong>7.70</strong>
                    </div>
                    <div className="stat-card">
                      <small>Batch</small>
                      <strong>2023-2027</strong>
                    </div>
                    <div className="stat-card">
                      <small>Department</small>
                      <strong>CSE</strong>
                    </div>
                  </div>

                  <div className="chip-row">
                    {[
                      "Full Stack Development",
                      "UI/UX Prototyping",
                      "Problem Solving",
                      "Cloud Computing",
                      "Internet of Things",
                      "Hackathon Participation"
                    ].map((chip) => (
                      <span className="chip" key={chip}>{chip}</span>
                    ))}
                  </div>

                  <div className="cta-row">
                    <a className="btn btn-primary" href={profile.resume} target="_blank" rel="noopener">
                      Download Resume
                    </a>
                  </div>
                </div>

                <div className="info-card about-side">
                  <div className="about-side-head">
                    <strong>What stands out right now</strong>
                    <p>
                      A quick snapshot of the strongest patterns across academics, learning direction, and recognition.
                    </p>
                  </div>

                  <div className="highlight-grid">
                    {highlights.map((item) => (
                      <div className="highlight-card" key={item.title}>
                        <strong>{item.title}</strong>
                        <p>{item.text}</p>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            <section className="section" id="education">
              <SectionHeader
                kicker="Education"
                title="Academic journey and score progression"
                text="The timeline below is based on the uploaded records and organizes school and undergraduate performance into a cleaner narrative."
              />

              <div className="timeline">
                {education.map((item) => (
                  <article className="timeline-card" key={item.institution + item.period}>
                    <span className="timeline-badge">{item.period}</span>
                    <h3>{item.institution}</h3>
                    <p>{item.detail}</p>
                    <p>{item.location}</p>
                    <div className="timeline-score">{item.score}</div>
                  </article>
                ))}
              </div>
            </section>

            <section className="section" id="skills">
              <SectionHeader
                kicker="Skills"
                title="Technical growth across code, systems, and design"
                text="Skill groups are compiled from the resume, academic materials, and portfolio summary, then presented with a clearer React-driven layout."
              />

              <div className="skills-grid">
                <article className="skill-card">
                  <h3 className="card-title">Technical Skills</h3>
                  <div className="progress-stack">
                    {technicalSkills.map((skill) => (
                      <div className="progress-row" key={skill.name}>
                        <label>
                          <span>{skill.name}</span>
                          <span>{skill.level}%</span>
                        </label>
                        <div className="progress">
                          <span style={{ width: `${skill.level}%` }} />
                        </div>
                      </div>
                    ))}
                  </div>
                </article>

                <article className="skill-card">
                  <h3 className="card-title">Soft Skills</h3>
                  <div className="chip-row">
                    {softSkills.map((skill) => (
                      <span className="chip" key={skill}>{skill}</span>
                    ))}
                  </div>
                </article>

                <article className="skill-card">
                  <h3 className="card-title">Tools and Platforms</h3>
                  <div className="chip-row">
                    {tools.map((tool) => (
                      <span className="chip" key={tool}>{tool}</span>
                    ))}
                  </div>
                </article>
              </div>
            </section>

            <section className="section" id="projects">
              <SectionHeader
                kicker="Projects"
                title="Practical work spanning backend systems and interface design"
                text="These projects reflect a mix of system-building, interface replication, and ongoing product thinking."
              />

              <div className="projects-grid">
                {projects.map((project) => (
                  <article className="project-card" key={project.title}>
                    <div className="meta-line">{project.period}</div>
                    <h3>{project.title}</h3>
                    <p>{project.description}</p>
                    <div className="chip-row">
                      {project.chips.map((chip) => (
                        <span className="chip" key={chip}>{chip}</span>
                      ))}
                    </div>
                    <div className="project-footer">
                      {project.link ? (
                        <a className="text-link" href={project.link} target="_blank" rel="noopener">
                          Explore GitHub
                        </a>
                      ) : (
                        <span className="note">{project.note}</span>
                      )}
                    </div>
                  </article>
                ))}
              </div>
            </section>

            <section className="section" id="certificates">
              <SectionHeader
                kicker="Certificates"
                title="Academic credentials and event participation archive"
                text="This gallery is rendered from the uploaded records and now supports filtering and modal previews through React state."
              />

              <div className="certificate-top">
                <div className="chip-row">
                  <span className="summary-pill">{counts.total} Certificates</span>
                  <span className="summary-pill">{counts.academic} Academic</span>
                  <span className="summary-pill">{counts.others} Others</span>
                  <span className="summary-pill">{counts.nss} NSS</span>
                  <span className="summary-pill">{counts.sports} Sports</span>
                </div>

                <div className="filter-row">
                  {[
                    { id: "all", label: "All" },
                    { id: "academic", label: "Academic" },
                    { id: "others", label: "Others" },
                    { id: "nss", label: "NSS" },
                    { id: "sports", label: "Sports" }
                  ].map((item) => (
                    <button
                      key={item.id}
                      type="button"
                      className={`filter-button ${filter === item.id ? "active" : ""}`}
                      onClick={() => setFilter(item.id)}
                    >
                      {item.label}
                    </button>
                  ))}
                </div>
              </div>

              {filteredCertificates.length ? (
                <div className="certificates-grid">
                  {filteredCertificates.map((certificate) => (
                    <article className="certificate-card" key={`${certificate.title}-${certificate.file}`}>
                      <div className="certificate-preview">
                        <span className="badge">{certificate.badgeText}</span>
                        {certificate.previewType === "image" ? (
                          <img src={certificate.preview} alt={certificate.title} />
                        ) : (
                          <PdfThumbnail file={certificate.file} title={certificate.title} />
                        )}
                      </div>

                      <div>
                        <h3>{certificate.title}</h3>
                        <p><strong>Issuer:</strong> {certificate.issuer}</p>
                        <p><strong>Date:</strong> {certificate.date}</p>
                      </div>

                      <div className="certificate-actions">
                        <button className="ghost-btn" type="button" onClick={() => setModalItem(certificate)}>
                          View Full
                        </button>
                        <a className="text-link" href={certificate.file} target="_blank" rel="noopener">
                          Open File
                        </a>
                      </div>
                    </article>
                  ))}
                </div>
              ) : (
                <div className="empty">No certificates were found for this category in the uploaded files.</div>
              )}
            </section>

            <section className="section" id="activities">
              <SectionHeader
                kicker="Achievements"
                title="Highlights from coursework, competitions, and recognition"
                text="This section stays focused on achievements that are directly supported by the portfolio source materials."
              />

              <div className="activities-grid">
                {activities.map((item) => (
                  <article className="activity-card" key={item.title}>
                    <h3>{item.title}</h3>
                    <p>{item.text}</p>
                    <span>{item.tag}</span>
                  </article>
                ))}
              </div>
            </section>

            <section className="section" id="contact">
              <SectionHeader
                kicker="Contact"
                title="Let's connect for internships, collaboration, and project opportunities"
                text="The contact form still uses a mailto flow so it works reliably in a static setup while keeping the page lightweight."
              />

              <div className="contact-grid">
                <div className="contact-card">
                  <h3 className="card-title">Reach out</h3>
                  <p>
                    Available for internships, student collaborations, project discussions, and technical networking.
                  </p>
                  <div className="contact-list">
                    <a href={`mailto:${profile.email}`}>{profile.email}</a>
                    <a href={`tel:${profile.phone.replace(/\s+/g, "")}`}>{profile.phone}</a>
                    <a href={profile.github} target="_blank" rel="noopener">GitHub</a>
                    <a href={profile.linkedin} target="_blank" rel="noopener">LinkedIn</a>
                    <a href={profile.locationLink} target="_blank" rel="noopener">National Engineering College</a>
                  </div>
                </div>

                <div className="contact-card">
                  <h3 className="card-title">Send a message</h3>
                  <form className="contact-form" onSubmit={submitMail}>
                    <input className="field" type="text" name="name" placeholder="Your Name" required />
                    <input className="field" type="email" name="email" placeholder="Your Email" required />
                    <textarea className="field" name="message" placeholder="Your Message" required />
                    <button className="btn btn-primary" type="submit">Send Message</button>
                    <div className="note">This opens your default mail client with the message prefilled.</div>
                  </form>
                </div>
              </div>
            </section>
          </main>

          <footer>
            <div className="footer">
              <div>
                <strong>Divya N</strong>
                <p>React portfolio for academics, projects, certifications, and growth highlights.</p>
              </div>
              <p>&copy; {new Date().getFullYear()} Divya N. All rights reserved.</p>
            </div>
          </footer>

          <button className="back-top" type="button" aria-label="Back to top" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}>
            Top
          </button>

          {modalItem && (
            <div className="modal" onClick={(event) => event.target === event.currentTarget && setModalItem(null)}>
              <div className="modal-card">
                <div className="modal-head">
                  <div>
                    <h3>{modalItem.title}</h3>
                    <p>{modalItem.issuer}</p>
                  </div>
                  <button className="close-btn" type="button" onClick={() => setModalItem(null)}>
                    X
                  </button>
                </div>
                <div className="modal-body">
                  {modalItem.previewType === "image" ? (
                    <img src={modalItem.file} alt={modalItem.title} />
                  ) : (
                    <iframe src={modalItem.file} title={modalItem.title} />
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
